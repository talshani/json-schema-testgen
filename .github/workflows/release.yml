name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - run: bun install

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(jq -r .version package.json)
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Tag v${TAG} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi

      - run: bun run build

      - name: Run publint
        run: bunx publint

      - name: Build binaries
        run: |
          mkdir -p bin
          bun build --compile --target=bun-linux-x64 src/cli.ts --outfile bin/json-schema-testgen-linux-x64
          bun build --compile --target=bun-linux-arm64 src/cli.ts --outfile bin/json-schema-testgen-linux-arm64
          bun build --compile --target=bun-darwin-x64 src/cli.ts --outfile bin/json-schema-testgen-darwin-x64
          bun build --compile --target=bun-darwin-arm64 src/cli.ts --outfile bin/json-schema-testgen-darwin-arm64

      - name: Package archives
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          cd bin
          for pair in "linux-x64:linux-x86_64" "linux-arm64:linux-aarch64" "darwin-x64:darwin-x86_64" "darwin-arm64:darwin-aarch64"; do
            src="${pair%%:*}"
            label="${pair##*:}"
            cp "json-schema-testgen-${src}" json-schema-testgen
            tar czf "json-schema-testgen-${TAG}-${label}.tar.gz" json-schema-testgen
            rm json-schema-testgen
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: bin/*.tar.gz

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
