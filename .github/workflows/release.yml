name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun run build-data

      - name: Build binaries
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          DEFINE="--define __VERSION__='\"${VERSION}\"'"
          mkdir -p dist
          bun build --compile ${DEFINE} --target=bun-linux-x64 src/cli.ts --outfile dist/json-schema-testgen-linux-x64
          bun build --compile ${DEFINE} --target=bun-linux-arm64 src/cli.ts --outfile dist/json-schema-testgen-linux-arm64
          bun build --compile ${DEFINE} --target=bun-darwin-x64 src/cli.ts --outfile dist/json-schema-testgen-darwin-x64
          bun build --compile ${DEFINE} --target=bun-darwin-arm64 src/cli.ts --outfile dist/json-schema-testgen-darwin-arm64

      - name: Package archives
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          cd dist
          for pair in "linux-x64:linux-x86_64" "linux-arm64:linux-aarch64" "darwin-x64:darwin-x86_64" "darwin-arm64:darwin-aarch64"; do
            src="${pair%%:*}"
            label="${pair##*:}"
            cp "json-schema-testgen-${src}" json-schema-testgen
            tar czf "json-schema-testgen-${TAG}-${label}.tar.gz" json-schema-testgen
            rm json-schema-testgen
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*.tar.gz
