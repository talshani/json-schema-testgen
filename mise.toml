[tools]
bun = "latest"
"npm:bumpp" = "latest"
"npm:publint" = "latest"

[tasks.publint]
run = "bun run build && publint"
description = "Build and run publint"

[tasks.release]
run = "bumpp --execute='sh -c \"bun run build && git add dist\"'"
description = "Bump version, rebuild dist, commit, and tag"

[tasks.test-pack]
run = """
rm -rf dist unpacked *.tgz
npm pack
mkdir -p unpacked
tar xzf *.tgz -C unpacked --strip-components=1
echo "Unpacked to unpacked/"
ls -R unpacked/
"""
description = "Clean, pack, and unpack to unpacked/ for inspection"
