[tools]
bun = "latest"
"npm:bumpp" = "latest"
"npm:publint" = "latest"

[tasks.publint]
run = "bun run build && publint"
description = "Build and run publint"

[tasks.release]
run = """
bun pm version patch --no-git-tag-version
bun run build
VERSION=$(bun pm pkg get version | tr -d '"')
git add -A
git commit -m "chore: release v$VERSION"
git tag "v$VERSION"
git push && git push --tags
"""
description = "Bump version, rebuild dist, commit, tag, and push"

[tasks.test-pack]
run = """
rm -rf dist unpacked *.tgz
npm pack
mkdir -p unpacked
tar xzf *.tgz -C unpacked --strip-components=1
echo "Unpacked to unpacked/"
ls -R unpacked/
"""
description = "Clean, pack, and unpack to unpacked/ for inspection"
